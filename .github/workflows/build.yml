name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    # Added permissions to allow the action to write back to the repo
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch all history so we can push back to the branch
          fetch-depth: 0

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
              
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile --production

      - name: Build development bundle
        run: bun run build --dev

#       - name: Upload development bundle (Artifact)
#        uses: actions/upload-artifact@v4
#        with:
#          name: revenge-bundle-development
#          path: dist/revenge.bundle
#          if-no-files-found: error

      - name: Clear build
        run: rm -rf dist

      - name: Build production bundle
        run: bun run build

